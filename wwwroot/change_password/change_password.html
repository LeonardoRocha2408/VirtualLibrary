<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title></title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div id="div_changePassword">
            <form id="formToChange">
                <h1>Mudança de senha</h1>
                <label for="username">Nome: </label>
                <div class="organizesInput">
                    <img src="../../Images/icons/iconUser.png">
                    <input id="username" placeholder="Digite seu username">
                </div>

                <label for="password">Senha: </label>
                <div class="organizesInput">
                    <img src="../../Images/icons/iconPassword.png">
                    <input type="password" id="password" placeholder="Digite sua senha">
                </div>

                <label for="newPassword">Nova Senha: </label>
                <div class="organizesInput">
                    <img src="../../Images/icons/iconPassword.png">
                    <input type="password" id="newPassword" placeholder="Digite a nova senha">
                </div>

                <button type="submit">Mudar</button>
            </form>
        </div>
        <script src="change_password.js"></script>
    </body>
</html>
